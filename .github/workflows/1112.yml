name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/mtvpls/MoonTVPlus.git 2>/dev/null || true

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check updates
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "::notice::New updates found ($UPSTREAM)"
          fi

      - name: Merge upstream (theirs strategy)
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git merge upstream/main -X theirs --no-edit
          git push origin main
          echo "::notice::Merged upstream successfully"
