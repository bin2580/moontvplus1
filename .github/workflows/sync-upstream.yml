name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 时间 0 点运行
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mtvpls/MoonTVPlus.git || true
          git remote -v

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for updates
        id: check
        run: |
          git checkout main
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No updates available"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "Updates available"
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream updates
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git checkout main
          # 尝试合并，如果失败则创建合并提交
          if ! git merge upstream/main --no-edit; then
            echo "Merge conflict detected, creating merge commit"
            git merge --abort || true
            git merge upstream/main --allow-unrelated-histories --no-edit
          fi
          
          # 检查是否有需要推送的更改
          if git diff --quiet HEAD origin/main; then
            echo "No changes to push"
          else
            git push origin main
            echo "Successfully pushed updates"
          fi

      - name: Notify success
        if: success()
        run: echo "Sync completed successfully"

      - name: Notify failure
        if: failure()
        run: echo "Sync failed, check logs for details"
