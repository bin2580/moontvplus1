name: Safe Sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Sync without deleting
        run: |
          # 1. 下载上游
          wget -q -O up.zip https://github.com/mtvpls/MoonTVPlus/archive/refs/heads/main.zip
          unzip -q -o up.zip -d upstream/
          
          # 2. 只复制，不删除（使用rsync的更新模式）
          rsync -av --update upstream/MoonTVPlus-main/ ./
          
          # 3. 确保我们的工作流不被覆盖
          if [ -f .github/workflows/download-sync.yml ]; then
            cp .github/workflows/download-sync.yml /tmp/my-workflow.yml
          fi
          
          # 4. 清理
          rm -rf upstream up.zip
          
          # 5. 提交
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "安全更新 $(date)" || echo "无更改"
          git push
