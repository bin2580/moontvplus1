name: Download and Sync from Upstream

on:
  workflow_dispatch:  # 先只支持手动触发，测试成功后再添加定时

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup environment
        run: |
          echo "工作目录: $GITHUB_WORKSPACE"
          echo "当前目录: $(pwd)"
          ls -la
      
      - name: Download latest from upstream
        run: |
          echo "=== 开始同步上游仓库 ==="
          echo "当前时间: $(date)"
          
          # 1. 下载上游仓库
          echo "1. 下载上游仓库..."
          wget -q --show-progress -O upstream.zip https://github.com/mtvpls/MoonTVPlus/archive/refs/heads/main.zip
          
          # 2. 解压
          echo "2. 解压文件..."
          unzip -q -o upstream.zip -d temp_upstream/
          
          # 3. 备份我们自己的工作流文件
          echo "3. 备份当前工作流文件..."
          if [ -f .github/workflows/download-sync.yml ]; then
            mkdir -p /tmp/backup
            cp .github/workflows/download-sync.yml /tmp/backup/
            echo "工作流文件已备份"
          fi
          
          # 4. 删除上游的.github/workflows目录
          echo "4. 清理上游的workflows目录..."
          rm -rf temp_upstream/MoonTVPlus-main/.github/workflows 2>/dev/null || true
          
          # 5. 使用cp命令而不是rsync（更简单可靠）
          echo "5. 复制文件到当前仓库..."
          # 先删除除了.git之外的所有文件
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} \; 2>/dev/null || true
          
          # 复制上游文件
          cp -r temp_upstream/MoonTVPlus-main/* . 2>/dev/null || true
          cp temp_upstream/MoonTVPlus-main/.* . 2>/dev/null || true
          
          # 6. 恢复我们自己的工作流文件
          echo "6. 恢复工作流文件..."
          rm -rf .github/workflows 2>/dev/null || true
          mkdir -p .github/workflows
          if [ -f /tmp/backup/download-sync.yml ]; then
            cp /tmp/backup/download-sync.yml .github/workflows/download-sync.yml
            echo "工作流文件已恢复"
          fi
          
          # 7. 清理临时文件
          echo "7. 清理临时文件..."
          rm -rf temp_upstream upstream.zip /tmp/backup 2>/dev/null || true
          
          echo "=== 文件同步完成 ==="
          echo "当前文件列表:"
          ls -la | head -20
      
      - name: Check for changes
        id: check_changes
        run: |
          # 检查git状态
          git status --porcelain
          
          if git diff --quiet --exit-code; then
            echo "没有检测到更改"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "检测到更改"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "提交更改..."
          
          # 设置Git身份
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 添加所有更改
          git add .
          
          # 提交
          git commit -m "🔄 自动同步上游仓库
          
          同步时间: $(date '+%Y-%m-%d %H:%M:%S')
          上游仓库: mtvpls/MoonTVPlus
          操作: 下载并覆盖更新"
          
          # 推送更改
          echo "推送到仓库..."
          git push origin main
          
          echo "✅ 同步完成并已推送"
      
      - name: No changes found
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "✅ 没有检测到更改，跳过提交"
          echo "当前仓库已是最新版本"
