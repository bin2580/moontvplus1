name: Download and Sync from Upstream

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        
      - name: Download and sync safely
        run: |
          echo "=== 安全同步开始 ==="
          
          # 1. 创建临时目录
          mkdir -p /tmp/sync_temp
          cd /tmp/sync_temp
          
          # 2. 下载上游仓库
          wget -q -O upstream.zip https://github.com/mtvpls/MoonTVPlus/archive/refs/heads/main.zip
          unzip -q -o upstream.zip
          
          # 3. 回到工作目录
          cd "$GITHUB_WORKSPACE"
          
          # 4. 备份重要文件
          echo "备份重要文件..."
          mkdir -p /tmp/backup
          [ -f .gitignore ] && cp .gitignore /tmp/backup/ || true
          [ -f README.md ] && cp README.md /tmp/backup/ || true
          [ -d .github/workflows ] && cp -r .github/workflows /tmp/backup/ || true
          
          # 5. 清理当前目录（除了.git）
          echo "清理当前目录..."
          find . -maxdepth 1 ! -name '.git' ! -name '.' -type f -exec rm -f {} \;
          find . -maxdepth 1 ! -name '.git' ! -name '.' -type d -exec rm -rf {} \; 2>/dev/null || true
          
          # 6. 复制上游文件
          echo "复制上游文件..."
          cp -r /tmp/sync_temp/MoonTVPlus-main/* . 2>/dev/null || true
          
          # 7. 恢复备份文件
          echo "恢复备份文件..."
          [ -f /tmp/backup/.gitignore ] && cp /tmp/backup/.gitignore . || true
          [ -f /tmp/backup/README.md ] && cp /tmp/backup/README.md . || true
          [ -d /tmp/backup/workflows ] && cp -r /tmp/backup/workflows .github/ || true
          
          # 8. 确保必要目录存在
          mkdir -p .github/workflows
          
          echo "=== 同步完成 ==="
          echo "当前文件:"
          ls -la
      
      - name: Commit changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          git add .
          if git diff --quiet --exit-code; then
            echo "没有更改"
          else
            git commit -m "恢复并同步上游仓库 $(date)"
            git push origin main
          fi
